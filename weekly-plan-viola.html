<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#05270B">
<link rel="apple-touch-icon" href="Violaness_logo_green.png">
<title>Violaness — Weekly Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:   #05270B;
    --rose:   #2F5C1A;
    --coral:  #29789E;
    --cream:  #f4f8f2;
    --card:   #FFFFFF;
    --ink:    #05270B;
    --muted:  #6b8a6b;
    --line:   #e8f0e4;
    --shadow: 0 2px 12px rgba(5,39,11,0.08);
    --radius: 14px;

    /* viola (green) easing into violin (blue) across the week */
    --mon: #8AB640;
    --tue: #6B9E3D;
    --wed: #2F5C1A;
    --thu: #1C4A38;
    --fri: #123A5E;
    --sat: #29789E;
    --sun: #46C6E5;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--cream); color: var(--ink);
    font-family: 'Special Elite', cursive; font-size: 0.92rem; line-height: 1.5;
    padding-bottom: 40px;
  }
  h1, h2, h3, .display { font-family: 'Special Elite', cursive; letter-spacing: 0.2px; }

  header.app-header {
    background: var(--teal); color: #fff; padding: 18px 16px 16px;
    position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow);
  }
  header.app-header h1 { margin: 0 0 10px; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.3px; }
  .week-nav { display: flex; flex-direction: column; gap: 10px; }
  .week-nav-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .week-nav button {
    background: rgba(255,255,255,0.2); border: none; color: #fff; width: 32px; height: 32px;
    border-radius: 8px; font-size: 1rem; cursor: pointer; flex-shrink: 0;
  }
  .week-nav button:hover { background: rgba(255,255,255,0.32); }
  .week-nav .today-btn {
    width: auto; padding: 0 14px; background: rgba(255,255,255,0.2); color: #fff; border: none;
    border-radius: 8px; height: 32px; font-family: 'Special Elite', cursive; font-size: 0.8rem; cursor: pointer;
  }
  .week-nav .today-btn:hover { background: rgba(255,255,255,0.32); }
  .week-range { font-weight: 600; font-size: 0.95rem; }
  .week-nav input[type="date"] {
    border: none; border-radius: 8px; padding: 6px 8px; font-family: 'Special Elite', cursive;
    font-size: 0.8rem; background: rgba(255,255,255,0.85); color: var(--ink); min-width: 0;
  }

  main { max-width: 1100px; margin: 0 auto; padding: 16px; }

  .card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px; margin-bottom: 16px;
  }
  .card h2 {
    font-size: 1rem; margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center;
  }
  .card h2 .pct { font-family: 'Special Elite', cursive; font-size: 0.72rem; color: var(--muted); font-weight: 600; }

  .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .top-row { grid-template-columns: 1fr; } }

  /* Habits grid */
  .habit-grid-head { display: grid; grid-template-columns: 1fr repeat(7, 30px); gap: 3px; margin-bottom: 4px; }
  .habit-grid-head span { text-align: center; font-size: 0.62rem; font-weight: 700; color: var(--muted); }
  .habit-row { display: grid; grid-template-columns: 1fr repeat(7, 30px); gap: 3px; align-items: center; padding: 5px 0; }
  .habit-row input.name {
    border: none; background: transparent; font-family: 'Special Elite', cursive; font-size: 0.82rem;
    color: var(--ink); width: 100%; padding: 3px 2px;
  }
  .habit-box {
    width: 26px; height: 26px; border-radius: 7px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: transparent;
  }
  .habit-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 2px 4px; }
  .add-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-row input[type=text] {
    flex: 1; font-family: 'Special Elite', cursive; font-size: 0.82rem; padding: 8px 10px;
    border: 1.5px solid var(--line); border-radius: 8px; background: var(--cream); color: var(--ink);
  }
  .btn {
    background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 0 14px;
    font-family: 'Special Elite', cursive; font-size: 0.8rem; font-weight: 600; cursor: pointer; height: 36px;
  }
  .btn:hover { opacity: 0.88; }
  .btn.ghost { background: var(--cream); color: var(--muted); border: 1.5px solid var(--line); }

  .progress-bar { height: 16px; background: var(--line); border-radius: 20px; overflow: hidden; margin-top: 10px; }
  .progress-bar .fill { height: 100%; transition: width 0.3s ease; }
  .progress-num { text-align: right; font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

  /* To-do */
  .todo-item { display: flex; align-items: center; gap: 9px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
  .todo-item:last-of-type { border-bottom: none; }
  .todo-check {
    width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--muted);
    background: #fff; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: transparent; font-size: 0.75rem;
  }
  .todo-check.checked { background: var(--coral); border-color: var(--coral); color: #fff; }
  .todo-text { flex: 1; font-size: 0.85rem; }
  .todo-text.done { text-decoration: line-through; color: var(--muted); }
  .todo-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 2px 6px; }
  .copy-btn-wrap { margin-bottom: 8px; }

  /* Day columns */
  .days-scroll {
    display: flex; gap: 14px; overflow-x: auto; padding-bottom: 10px; scroll-snap-type: x proximity;
  }
  .day-col {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    min-width: 250px; flex-shrink: 0; scroll-snap-align: start; overflow: hidden;
  }
  .day-col.is-today { outline: 2px solid var(--ink); outline-offset: 1px; }
  .day-head { padding: 12px 14px 10px; color: #fff; }
  .day-head .dname { font-weight: 700; font-size: 0.95rem; }
  .day-head .ddate { font-size: 0.72rem; opacity: 0.9; }
  .day-body { padding: 12px 14px; }
  .day-section-label {
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.4px; color: var(--muted);
    text-transform: uppercase; margin: 12px 0 6px;
  }
  .day-section-label:first-child { margin-top: 0; }
  .focus-input {
    width: 100%; border: 1.5px solid var(--line); border-radius: 8px; padding: 7px 9px;
    font-family: 'Special Elite', cursive; font-size: 0.82rem; background: var(--cream); color: var(--ink);
  }
  .event-item, .task-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .event-time {
    width: 60px; flex-shrink: 0; border: none; background: var(--cream); border-radius: 6px;
    padding: 5px 6px; font-size: 0.72rem; font-family: 'Special Elite', cursive;
  }
  .event-text, .task-text {
    flex: 1; border: none; background: var(--cream); border-radius: 6px; padding: 5px 7px;
    font-size: 0.78rem; font-family: 'Special Elite', cursive;
  }
  .task-check {
    width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--muted); background: #fff;
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: transparent; font-size: 0.68rem;
  }
  .mini-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 2px 4px; flex-shrink: 0; }
  .mini-add {
    width: 100%; margin-top: 4px; border: 1px dashed var(--line); background: none; border-radius: 6px;
    padding: 6px; font-size: 0.75rem; color: var(--muted); cursor: pointer; font-family: 'Special Elite', cursive;
  }
  .mini-add:hover { border-color: var(--muted); }
  .day-progress { height: 8px; background: var(--line); border-radius: 10px; overflow: hidden; margin: 4px 0 2px; }
  .day-progress .fill { height: 100%; transition: width 0.3s ease; }
  .day-pct { font-size: 0.68rem; color: var(--muted); text-align: right; }

  footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 22px 16px 10px; }
</style>
</head>
<body>

<header class="app-header">
  <h1>Violaness — Weekly Plan</h1>
  <div class="week-nav">
    <div class="week-nav-row">
      <button onclick="shiftWeek(-1)">‹</button>
      <div class="week-range" id="weekRange">—</div>
      <button onclick="shiftWeek(1)">›</button>
    </div>
    <div class="week-nav-row">
      <input type="date" id="weekPicker" onchange="jumpToDate(this.value)">
      <button class="today-btn" onclick="jumpToday()">Today</button>
    </div>
  </div>
</header>

<main>
  <div class="top-row">
    <div class="card">
      <h2>Weekly Habits <span class="pct" id="habitsPct">0%</span></h2>
      <div class="habit-grid-head">
        <span></span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
      </div>
      <div id="habitList"></div>
      <div class="add-row">
        <input type="text" id="newHabitInput" placeholder="add a habit…" maxlength="40">
        <button class="btn" onclick="addHabit()">Add</button>
      </div>
      <div class="progress-bar"><div class="fill" id="habitsFill" style="width:0%; background:var(--sat);"></div></div>
    </div>

    <div class="card">
      <h2>Weekly To-Do List <span class="pct" id="todoPct">0%</span></h2>
      <div class="copy-btn-wrap">
        <button class="btn ghost" onclick="copyLastWeekTodos()">↻ Copy last week's list</button>
      </div>
      <div id="todoList"></div>
      <div class="add-row">
        <input type="text" id="newTodoInput" placeholder="add a task…" maxlength="80">
        <button class="btn" onclick="addTodo()">Add</button>
      </div>
      <div class="progress-bar"><div class="fill" id="todoFill" style="width:0%; background:var(--coral);"></div></div>
    </div>
  </div>

  <div class="days-scroll" id="daysScroll"></div>
</main>

<footer>🎻 saved automatically on this device</footer>

<script>
const STORE_KEY = 'weekly_planner_v1';
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT = ['M','T','W','T','F','S','S'];
const DAY_COLORS = ['var(--mon)','var(--tue)','var(--wed)','var(--thu)','var(--fri)','var(--sat)','var(--sun)'];
const DAY_HEX    = ['#8AB640','#6B9E3D','#2F5C1A','#1C4A38','#123A5E','#29789E','#46C6E5'];
const LIGHT_DAY_INDEXES = [0, 1, 6]; // Mon, Tue, Sun — light backgrounds need dark text for contrast

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    habitNames: ['8hr+ sleep', 'morning walk', 'journal entry'],
    weeks: {},
    currentWeekStart: toISO(getMonday(new Date()))
  };
}
let state = loadState();
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function toISO(d) {
  const dt = new Date(d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function addDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d;
}
function fmtShort(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function isSameDate(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function ensureWeek(weekStart) {
  if (!state.weeks[weekStart]) {
    state.weeks[weekStart] = {
      habitChecks: {},
      focus: ['','','','','','',''],
      events: [[],[],[],[],[],[],[]],
      tasks: [[],[],[],[],[],[],[]],
      todos: []
    };
  }
  const wk = state.weeks[weekStart];
  state.habitNames.forEach(name => {
    if (!wk.habitChecks[name]) wk.habitChecks[name] = [false,false,false,false,false,false,false];
  });
  return wk;
}

function currentWeek() { return ensureWeek(state.currentWeekStart); }

function shiftWeek(dir) {
  state.currentWeekStart = toISO(addDays(state.currentWeekStart, dir * 7));
  save();
  renderAll();
}
function jumpToDate(dateStr) {
  if (!dateStr) return;
  state.currentWeekStart = toISO(getMonday(new Date(dateStr + 'T00:00:00')));
  save();
  renderAll();
}
function jumpToday() {
  state.currentWeekStart = toISO(getMonday(new Date()));
  save();
  renderAll();
}

function renderWeekHeader() {
  const start = new Date(state.currentWeekStart + 'T00:00:00');
  const end = addDays(state.currentWeekStart, 6);
  document.getElementById('weekRange').textContent = `${fmtShort(start)} – ${fmtShort(end)}`;
  document.getElementById('weekPicker').value = state.currentWeekStart;
}

function renderHabits() {
  const wk = currentWeek();
  const list = document.getElementById('habitList');
  list.innerHTML = '';
  state.habitNames.forEach((name, hi) => {
    const row = document.createElement('div');
    row.className = 'habit-row';

    const input = document.createElement('input');
    input.className = 'name';
    input.type = 'text';
    input.value = name;
    input.addEventListener('change', () => {
      const newName = input.value.trim() || name;
      if (newName !== name) {
        state.habitNames[hi] = newName;
        Object.keys(state.weeks).forEach(w => {
          const checks = state.weeks[w].habitChecks;
          if (checks[name] && !checks[newName]) { checks[newName] = checks[name]; delete checks[name]; }
        });
      }
      save(); renderHabits();
    });
    row.appendChild(input);

    wk.habitChecks[name].forEach((checked, di) => {
      const box = document.createElement('button');
      box.className = 'habit-box';
      box.style.background = checked ? DAY_HEX[di] : '#f0ede6';
      box.style.color = checked ? '#fff' : 'transparent';
      box.textContent = checked ? '✓' : '';
      box.addEventListener('click', () => {
        wk.habitChecks[name][di] = !wk.habitChecks[name][di];
        save(); renderHabits();
      });
      row.appendChild(box);
    });

    const del = document.createElement('button');
    del.className = 'habit-del';
    del.textContent = '✕';
    del.addEventListener('click', () => {
      state.habitNames.splice(hi, 1);
      save(); renderHabits();
    });
    row.appendChild(del);

    list.appendChild(row);
  });

  let total = 0, checked = 0;
  state.habitNames.forEach(name => wk.habitChecks[name].forEach(v => { total++; if (v) checked++; }));
  const pct = total ? Math.round((checked/total)*100) : 0;
  document.getElementById('habitsPct').textContent = pct + '%';
  document.getElementById('habitsFill').style.width = pct + '%';
}

function addHabit() {
  const input = document.getElementById('newHabitInput');
  const val = input.value.trim();
  if (!val) return;
  if (!state.habitNames.includes(val)) state.habitNames.push(val);
  input.value = '';
  save(); renderHabits();
}

function renderTodos() {
  const wk = currentWeek();
  const list = document.getElementById('todoList');
  list.innerHTML = '';
  if (wk.todos.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center; padding:14px; color:var(--muted); font-size:0.8rem; font-style:italic;';
    empty.textContent = 'nothing on the list yet';
    list.appendChild(empty);
  }
  wk.todos.forEach((t, ti) => {
    const row = document.createElement('div');
    row.className = 'todo-item';

    const box = document.createElement('div');
    box.className = 'todo-check' + (t.done ? ' checked' : '');
    box.textContent = t.done ? '✓' : '';
    box.addEventListener('click', () => { t.done = !t.done; save(); renderTodos(); });
    row.appendChild(box);

    const text = document.createElement('div');
    text.className = 'todo-text' + (t.done ? ' done' : '');
    text.textContent = t.text;
    row.appendChild(text);

    const del = document.createElement('button');
    del.className = 'todo-del';
    del.textContent = '✕';
    del.addEventListener('click', () => { wk.todos.splice(ti, 1); save(); renderTodos(); });
    row.appendChild(del);

    list.appendChild(row);
  });

  const total = wk.todos.length;
  const done = wk.todos.filter(t => t.done).length;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('todoPct').textContent = pct + '%';
  document.getElementById('todoFill').style.width = pct + '%';
}

function addTodo() {
  const wk = currentWeek();
  const input = document.getElementById('newTodoInput');
  const val = input.value.trim();
  if (!val) return;
  wk.todos.push({ text: val, done: false });
  input.value = '';
  save(); renderTodos();
}

function copyLastWeekTodos() {
  const wk = currentWeek();
  const prevKey = toISO(addDays(state.currentWeekStart, -7));
  const prev = state.weeks[prevKey];
  if (!prev || prev.todos.length === 0) { alert("No to-do items found on last week's list."); return; }
  prev.todos.forEach(t => wk.todos.push({ text: t.text, done: false }));
  save(); renderTodos();
}

function renderDays() {
  const wk = currentWeek();
  const scroll = document.getElementById('daysScroll');
  scroll.innerHTML = '';
  const today = new Date();

  DAY_NAMES.forEach((dname, di) => {
    const dateObj = addDays(state.currentWeekStart, di);
    const isToday = isSameDate(dateObj, today);

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' is-today' : '');

    const head = document.createElement('div');
    head.className = 'day-head';
    head.style.background = DAY_HEX[di];
    head.style.color = LIGHT_DAY_INDEXES.includes(di) ? 'var(--ink)' : '#fff';
    head.innerHTML = `<div class="dname">${dname}${isToday ? ' ★' : ''}</div><div class="ddate">${fmtShort(dateObj)}</div>`;
    col.appendChild(head);

    const body = document.createElement('div');
    body.className = 'day-body';

    // Today's focus
    const focusLabel = document.createElement('div');
    focusLabel.className = 'day-section-label';
    focusLabel.textContent = "Today's focus";
    body.appendChild(focusLabel);
    const focusInput = document.createElement('input');
    focusInput.className = 'focus-input';
    focusInput.type = 'text';
    focusInput.placeholder = 'focus for the day…';
    focusInput.value = wk.focus[di];
    focusInput.addEventListener('change', () => { wk.focus[di] = focusInput.value; save(); });
    body.appendChild(focusInput);

    // Events
    const evLabel = document.createElement('div');
    evLabel.className = 'day-section-label';
    evLabel.textContent = 'Events';
    body.appendChild(evLabel);
    wk.events[di].forEach((ev, ei) => {
      const row = document.createElement('div');
      row.className = 'event-item';
      const time = document.createElement('input');
      time.className = 'event-time'; time.type = 'text'; time.placeholder = 'time'; time.value = ev.time;
      time.addEventListener('change', () => { ev.time = time.value; save(); });
      const txt = document.createElement('input');
      txt.className = 'event-text'; txt.type = 'text'; txt.placeholder = 'event'; txt.value = ev.text;
      txt.addEventListener('change', () => { ev.text = txt.value; save(); });
      const del = document.createElement('button');
      del.className = 'mini-del'; del.textContent = '✕';
      del.addEventListener('click', () => { wk.events[di].splice(ei,1); save(); renderDays(); });
      row.appendChild(time); row.appendChild(txt); row.appendChild(del);
      body.appendChild(row);
    });
    const addEv = document.createElement('button');
    addEv.className = 'mini-add'; addEv.textContent = '+ add event';
    addEv.addEventListener('click', () => { wk.events[di].push({time:'', text:''}); save(); renderDays(); });
    body.appendChild(addEv);

    // Tasks
    const taskLabel = document.createElement('div');
    taskLabel.className = 'day-section-label';
    taskLabel.textContent = 'Tasks';
    body.appendChild(taskLabel);

    const tTotal = wk.tasks[di].length;
    const tDone = wk.tasks[di].filter(t => t.done).length;
    const tPct = tTotal ? Math.round((tDone/tTotal)*100) : 0;
    const prog = document.createElement('div');
    prog.className = 'day-progress';
    prog.innerHTML = `<div class="fill" style="width:${tPct}%; background:${DAY_HEX[di]};"></div>`;
    body.appendChild(prog);
    const pctLabel = document.createElement('div');
    pctLabel.className = 'day-pct';
    pctLabel.textContent = tPct + '%';
    body.appendChild(pctLabel);

    wk.tasks[di].forEach((t, ti) => {
      const row = document.createElement('div');
      row.className = 'task-item';
      const box = document.createElement('div');
      box.className = 'task-check' + (t.done ? '' : '');
      box.style.background = t.done ? DAY_HEX[di] : '#fff';
      box.style.borderColor = t.done ? DAY_HEX[di] : '';
      box.style.color = t.done ? '#fff' : 'transparent';
      box.textContent = t.done ? '✓' : '';
      box.addEventListener('click', () => { t.done = !t.done; save(); renderDays(); });
      const txt = document.createElement('input');
      txt.className = 'task-text'; txt.type = 'text'; txt.value = t.text;
      if (t.done) txt.style.textDecoration = 'line-through';
      txt.style.color = t.done ? 'var(--muted)' : 'var(--ink)';
      txt.addEventListener('change', () => { t.text = txt.value; save(); });
      const del = document.createElement('button');
      del.className = 'mini-del'; del.textContent = '✕';
      del.addEventListener('click', () => { wk.tasks[di].splice(ti,1); save(); renderDays(); });
      row.appendChild(box); row.appendChild(txt); row.appendChild(del);
      body.appendChild(row);
    });
    const addTask = document.createElement('button');
    addTask.className = 'mini-add'; addTask.textContent = '+ add task';
    addTask.addEventListener('click', () => { wk.tasks[di].push({text:'', done:false}); save(); renderDays(); });
    body.appendChild(addTask);

    col.appendChild(body);
    scroll.appendChild(col);
  });
}

function renderAll() {
  renderWeekHeader();
  renderHabits();
  renderTodos();
  renderDays();
}

document.getElementById('newHabitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
document.getElementById('newTodoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

renderAll();
</script>
